<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Form</title>
  
</head>
<body>

  <form id="survey-form">
    <h1 id="title">Survey Form</h1>
    <p id="description">Please fill out the form below. Your feedback matters!</p>

    <label for="name" id="name-label">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

    <label for="email" id="email-label">Email Address</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>

    <label for="number" id="number-label">Age</label>
    <input type="number" id="number" name="age" placeholder="Enter your age" min="10" max="100">

    <label for="dropdown">Which is your favorite programming language?</label>
    <select id="dropdown" name="language" required>
      <option value="" disabled selected>Select an option</option>
      <option value="python">Python</option>
      <option value="javascript">JavaScript</option>
      <option value="java">Java</option>
      <option value="c++">C++</option>
    </select>

    <label>Gender</label>
    <div class="options">
      <input type="radio" name="gender" value="male" required> Male
      <input type="radio" name="gender" value="female" required> Female
      <input type="radio" name="gender" value="other" required> Other
    </div>

    <label>Skills You Know</label>
    <div class="options">
      <input type="checkbox" name="skills" value="html"> HTML
      <input type="checkbox" name="skills" value="css"> CSS
      <input type="checkbox" name="skills" value="javascript"> JavaScript
      <input type="checkbox" name="skills" value="python"> Python
    </div>

    <label for="comments">Additional Comments</label>
    <textarea id="comments" name="comments" placeholder="Write your comments here..." rows="4"></textarea>

    <button type="submit" id="submit">Submit</button>
  </form>

</body>
</html>
